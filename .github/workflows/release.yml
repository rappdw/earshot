name: release

# Pushing a v* tag creates the GitHub release automatically with generated
# notes. There are no build artifacts: the repo itself is the plugin, and the
# CLI installs from a clone.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run the test suite first
        run: ./tests/run.sh
      - name: create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "earshot $GITHUB_REF_NAME" \
            --generate-notes
