# earshot.conf - configuration for the local meeting capture pipeline.
# Sourced by the earshot script. Plain shell, macOS bash 3.2 safe.

# Default capture profile if --profile is not passed.
EARSHOT_DEFAULT_PROFILE="obsbot"

# ---------------------------------------------------------------------------
# Contexts: route recordings to different directories (e.g. business vs
# personal). Each context has its own output root, set independently below, so
# you can put personal meetings on a different volume if you like. Pick the
# default with EARSHOT_DEFAULT_CONTEXT; override per run with `earshot rec -c
# personal`. An explicit `-o DIR` still overrides everything.
# ---------------------------------------------------------------------------
EARSHOT_DEFAULT_CONTEXT="business"
EARSHOT_OUT_ROOT_BUSINESS="${HOME}/Notes/meetings/business"
EARSHOT_OUT_ROOT_PERSONAL="${HOME}/Notes/meetings/personal"

# Per-context speaker libraries, so business and personal voiceprints never mix.
# diarize/enroll/speakers use the library for the active context (chosen by -c,
# inferred from the meeting's path, or the default context).
EARSHOT_SPEAKERS_BUSINESS="${HOME}/.config/earshot/speakers-business.json"
EARSHOT_SPEAKERS_PERSONAL="${HOME}/.config/earshot/speakers-personal.json"

# Fallback output root when EARSHOT_DEFAULT_CONTEXT is empty and no -c is passed.
EARSHOT_OUT_ROOT="${HOME}/Notes/meetings"

earshot_load_context() {
  case "$1" in
    business)
      CONTEXT_OUT="${EARSHOT_OUT_ROOT_BUSINESS}"
      CONTEXT_SPEAKERS="${EARSHOT_SPEAKERS_BUSINESS}"
      ;;
    personal)
      CONTEXT_OUT="${EARSHOT_OUT_ROOT_PERSONAL}"
      CONTEXT_SPEAKERS="${EARSHOT_SPEAKERS_PERSONAL}"
      ;;
    *) return 1 ;;
  esac
  return 0
}

# Sample rate for capture. We downsample to 16k mono at transcription time,
# so leave this at 48000.
EARSHOT_SAMPLE_RATE="48000"

# Device that carries the call audio (the BlackHole virtual output that your
# Multi-Output Device feeds). This is the "far" channel: everyone but you.
# Must match the name exactly as shown by:  earshot --dev-list
EARSHOT_BLACKHOLE_NAME="BlackHole 2ch"

# Auto-stop: end the recording after this many seconds of continuous silence on
# the CALL channel (far_remote.wav), since a meeting that has ended produces real
# digital silence there. App-agnostic (Zoom/Teams/Meet). Set 0 to disable.
# A long genuine lull (everyone muted, silent screen-share) can trip this early;
# raise it or use --no-auto-stop for meetings where that is likely.
EARSHOT_AUTOSTOP_SILENCE="180"
EARSHOT_SILENCE_DB="-50dB"        # level below which the call channel counts as silent
EARSHOT_MAX_MINUTES="0"           # hard cap on recording length in minutes (0 = no cap)

# ---------------------------------------------------------------------------
# Summarization (`earshot summarize DIR`).
#
# Local by default. The ollama backend runs entirely on your hardware. The
# claude backend sends the transcript to Anthropic (text leaves the box) and is
# opt-in per run with `--backend claude`; it prints a loud warning and needs
# ANTHROPIC_API_KEY in your environment. Keep it off for sensitive meetings.
# ---------------------------------------------------------------------------
EARSHOT_SUMMARY_BACKEND="ollama"                  # ollama (local default) | claude (opt-in)
EARSHOT_OLLAMA_URL="http://localhost:11434"       # local Ollama server
EARSHOT_OLLAMA_MODEL="llama3.1"                   # any model you've `ollama pull`ed
EARSHOT_CLAUDE_MODEL="claude-opus-4-8"            # used only when --backend claude
EARSHOT_SUMMARY_MAX_TOKENS="4096"                 # max output tokens for the notes

# vLLM / OpenAI-compatible backend (--backend vllm): reuse an existing
# OpenAI-compatible server (e.g. vLLM) instead of running Ollama. Set the model
# to whatever that server serves. For offload, the container reaches a host
# server at localhost via host networking.
EARSHOT_OPENAI_URL="http://localhost:8000/v1"     # OpenAI-compatible base URL (include /v1)
EARSHOT_OPENAI_MODEL=""                            # the model your server serves (required for vllm)
# EARSHOT_OPENAI_API_KEY=""                        # only if your server requires a key

# Offloaded summarization (`earshot offload DIR --summarize`) runs in the
# container against a server on the remote host. With vLLM already running there:
#   earshot offload DIR --summarize --sum-args "--backend vllm --model <name>"
# See docker/README.md.

# ---------------------------------------------------------------------------
# DGX Spark offload (optional).
#
# `earshot offload DIR` ships a meeting's audio to the Spark over plain SSH +
# rsync, runs transcribe/diarize there inside a tmux session (so the job
# survives a disconnect), and pulls the results back. Nothing is exposed
# publicly; this rides your LAN or Twingate and SSH keys. The host should be an
# SSH config alias that both ssh and mosh can reach (e.g. your "dgx" alias).
# Leave EARSHOT_SPARK_HOST empty to disable.
# ---------------------------------------------------------------------------
EARSHOT_SPARK_HOST="dgx"                        # ssh/mosh host alias (or user@host)
EARSHOT_SPARK_DIR="earshot-work"                # remote staging root (under the remote ~)
EARSHOT_SPARK_EARSHOT="~/.local/bin/earshot"    # remote earshot path (non-login ssh has a thin PATH)
# To run the remote steps in a CUDA container instead, point this at the wrapper:
#   EARSHOT_SPARK_EARSHOT="~/earshot/docker/earshot-container"   # see docker/README.md
EARSHOT_SSH_OPTS=""                             # extra ssh opts, e.g. "-p 2222 -i ~/.ssh/spark"
EARSHOT_MOSH="mosh"                             # used by --watch to attach live
EARSHOT_POLL_SECS="5"                           # how often to poll the remote job for completion

# ---------------------------------------------------------------------------
# Capture profiles.
#
# earshot records two devices in parallel, resolved BY NAME at record time:
#   far_remote.wav <- EARSHOT_BLACKHOLE_NAME  (the call)
#   near_me.wav    <- the profile's MIC_NAME  (your microphone)
#
# A profile is therefore just a microphone device name. No aggregate devices,
# no channel maps. Because resolution is by name, the same profile works at any
# location where that mic name appears (e.g. an OBSBOT at home and at work both
# show as "OBSBOT Meet Microphone").
#
# MIC_NAME must match a name from:  earshot --dev-list
# ---------------------------------------------------------------------------
earshot_load_profile() {
  case "$1" in
    obsbot)
      MIC_NAME="OBSBOT Meet Microphone"
      ;;
    mba)
      MIC_NAME="MacBook Air Microphone"
      ;;
    d4)
      # TODO: set this to the exact mic name your D4 setup uses.
      # Run `earshot --dev-list` with that mic connected and copy the name.
      MIC_NAME="MacBook Air Microphone"
      ;;
    *)
      return 1
      ;;
  esac
  return 0
}
